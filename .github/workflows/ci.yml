name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: uv sync --frozen
      - run: npm ci
      - run: uv run pytest
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: npm run check
      - run: npm --prefix worker test
      - run: uv run python -m kelly_lab.verify
      - run: npm run build
