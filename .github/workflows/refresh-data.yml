name: Refresh validated market data

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Rebuild the selected histories instead of incrementally refreshing"
        required: false
        type: boolean
        default: false
      asset_ids:
        description: "Optional comma-separated catalog IDs (for example stock-aapl,fx-usd-krw)"
        required: false
        type: string
      start:
        description: "Optional first date (YYYY-MM-DD)"
        required: false
        type: string
      end:
        description: "Optional last date (YYYY-MM-DD)"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: kelly-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      data_changed: ${{ steps.publish.outputs.data_changed }}
      published_sha: ${{ steps.publish.outputs.published_sha }}
    env:
      KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      KRX_PUBLIC_DISPLAY_APPROVED: ${{ vars.KRX_PUBLIC_DISPLAY_APPROVED }}
      YAHOO_PUBLIC_DISPLAY_APPROVED: ${{ vars.YAHOO_PUBLIC_DISPLAY_APPROVED || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - name: Collect through the normalized free-source publisher
        id: collect
        env:
          REFRESH_BACKFILL: ${{ inputs.backfill }}
          REFRESH_ASSET_IDS: ${{ inputs.asset_ids }}
          REFRESH_START: ${{ inputs.start }}
          REFRESH_END: ${{ inputs.end }}
        run: |
          refresh_args=(--catalog config/catalog.json)
          if test "$REFRESH_BACKFILL" = "true"; then
            refresh_args+=(--backfill)
          fi
          if test -n "$REFRESH_ASSET_IDS"; then
            IFS=',' read -ra requested_assets <<< "$REFRESH_ASSET_IDS"
            for asset_id in "${requested_assets[@]}"; do
              if ! [[ "$asset_id" =~ ^[a-z0-9-]+$ ]]; then
                echo "Invalid catalog asset ID: $asset_id" >&2
                exit 2
              fi
              refresh_args+=(--asset-id "$asset_id")
            done
          fi
          if test -n "$REFRESH_START"; then
            refresh_args+=(--start "$REFRESH_START")
          fi
          if test -n "$REFRESH_END"; then
            refresh_args+=(--end "$REFRESH_END")
          fi
          set +e
          uv run python -m kelly_lab.refresh "${refresh_args[@]}"
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - run: uv run python -m kelly_lab.verify
      - name: Commit validated public artifacts
        id: publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin "$GITHUB_REF_NAME"
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse FETCH_HEAD)" ]]; then
            echo "The target branch advanced during collection; rerun from the new head." >&2
            exit 1
          fi
          git add data
          if git diff --cached --quiet; then
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
            echo "published_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: refresh validated market series"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
            echo "published_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi
      - name: Fail after publishing refresh diagnostics
        run: test "${{ steps.collect.outputs.exit_code }}" = "0"

  deploy:
    needs: refresh
    if: >-
      ${{ always() &&
          needs.refresh.outputs.data_changed == 'true' &&
          github.ref_name == github.event.repository.default_branch }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
    with:
      ref: ${{ needs.refresh.outputs.published_sha }}
