name: Deploy Pages

on:
  push:
    branches: [main]
  # Commits made by refresh-data with GITHUB_TOKEN do not recursively emit a
  # push-triggered workflow.  Deploy the validated default-branch snapshot
  # when that workflow completes, including a diagnostics-only failed run.
  workflow_run:
    workflows: ["Refresh validated market data", "Refresh expanded US universe"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: uv sync --frozen
      - run: npm ci
      - run: uv run pytest
      - run: npm run check
      - run: npm --prefix worker test
      - run: uv run python -m kelly_lab.verify
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
      - run: uv run python -m kelly_lab.verify --base-url "${{ steps.deployment.outputs.page_url }}"
